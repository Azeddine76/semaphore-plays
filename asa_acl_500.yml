---
- name: Configure ASA ACL with 500 dynamic rules (no JSON)
  hosts: asa
  gather_facts: no
  collections:
    - community.general
    - cisco.asa

  vars:
    acl_name: global_access
    ansible_network_os: cisco.asa.asa
    ansible_connection: ansible.netcommon.network_cli
    ansible_become: true
    ansible_become_method: enable

  tasks:
    - name: Render ACL from Jinja2 template
      set_fact:
        asa_acl_rendered: "{{ lookup('template', 'templates/asa_acl_500.j2') }}"

    - name: Push ACL to ASA
      asa_config:
        lines: "{{ asa_acl_rendered.split('\n') }}"
        match: none

    - name: Apply ACL to interface
      asa_config:
        lines:
          - "access-group {{ acl_name }} global"
        match: none
