---
- name: Remove orphan remarks from ASA ACL
  hosts: asa
  gather_facts: no
  collections:
    - community.general
    - ansible.netcommon
    - cisco.asa

  vars:
    acl_name: global_access
    ansible_network_os: cisco.asa.asa
    ansible_connection: ansible.netcommon.network_cli
    ansible_become: true
    ansible_become_method: enable

  tasks:
    - name: Get ACL from ASA
      asa_command:
        commands:
          - show access-list {{ acl_name }}
      register: acl_output

    - name: Debug ACL output (optional)
      debug:
        var: acl_output.stdout_lines

    - name: Extract ACL lines into list
      set_fact:
        acl_lines: "{{ acl_output.stdout_lines[0].split('\n') | map('trim') | list }}"

    - name: Identify orphan remarks
      set_fact:
        orphan_remarks: >-
          {{
            acl_lines
            | select('match', '^access-list ' ~ acl_name ~ ' remark')
            | select('search', '.*')
            | list
            | select('match', '.*')
            | map('regex_replace', '^(.*)$', '\\1')
            | list
            | select('match', '.*')
          }}

    - name: Filter orphan remarks (no ACE after remark)
      set_fact:
        remarks_to_delete: >-
          {{
            acl_lines
            | map('trim')
            | list
            | zip(acl_lines[1:] | map('trim') | list)
            | selectattr('0', 'match', '^access-list ' ~ acl_name ~ ' remark')
            | rejectattr('1', 'match', '^access-list ' ~ acl_name ~ ' extended')
            | map(attribute='0')
            | list
          }}

    - name: Debug output (optional)
      debug:
        msg: "Deleting orphan remark: {{ item }}"
      loop: "{{ remarks_to_delete }}"

    - name: Remove orphan remarks from ASA
      asa_config:
        lines: "{{ remarks_to_delete | map('regex_replace', '^access-list ', 'no access-list ') | list }}"
        match: none
      when: remarks_to_delete | length > 0
